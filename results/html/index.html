<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascend 310P3 μBench 微架构参数测定报告</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e17;--card:#111927;--border:rgba(255,255,255,0.06);--text:#c8d6e5;--dim:#5a6a7a;--cyan:#00d4ff;--green:#00e676;--red:#ff5252;--orange:#ff9100;--yellow:#ffd740;--purple:#b388ff;--teal:#00bfa5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,#0d1b2a,#1b2838);border-bottom:1px solid rgba(0,212,255,.15);padding:36px 0;text-align:center}
.hdr h1{font-size:2.2rem;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--dim);font-size:.9rem;margin-top:6px}
.ctr{max-width:1400px;margin:0 auto;padding:28px 20px}

/* metric cards */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:28px}
.mc{background:linear-gradient(135deg,#111927,#162033);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;cursor:default}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.mc.mte::before{background:linear-gradient(90deg,var(--red),var(--orange))}
.mc.vec::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.mc.scl::before{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.mc.cub::before{background:linear-gradient(90deg,var(--purple),#7c4dff)}
.mc .lb{font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.mc .vl{font-size:1.9rem;font-weight:700;margin:3px 0}
.mc .un{font-size:.8rem;color:var(--dim)}
.mc.mte .vl{color:var(--red)}.mc.vec .vl{color:var(--green)}.mc.scl .vl{color:var(--yellow)}.mc.cub .vl{color:var(--purple)}
.mc.warn{border-color:rgba(255,215,64,.25)}
.mc .warn-tag{display:inline-block;background:rgba(255,215,64,.12);color:var(--yellow);font-size:.7rem;padding:2px 8px;border-radius:10px;margin-top:4px}

/* sections */
.sec{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:24px;overflow:hidden}
.sh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sh .ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.sh .ic.mte{background:rgba(255,82,82,.15)}.sh .ic.vec{background:rgba(0,230,118,.15)}.sh .ic.scl{background:rgba(255,215,64,.15)}.sh .ic.cub{background:rgba(179,136,255,.15)}
.sh h2{font-size:1.15rem;font-weight:600}
.sh .bd{margin-left:auto;padding:3px 10px;border-radius:16px;font-size:.72rem;font-weight:600}
.bd-ok{background:rgba(0,230,118,.15);color:var(--green)}.bd-warn{background:rgba(255,215,64,.15);color:var(--yellow)}.bd-skip{background:rgba(179,136,255,.15);color:var(--purple)}
.sb{padding:22px}

/* chart grid */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:900px){.cg{grid-template-columns:1fr}}
.cb{background:rgba(0,0,0,.2);border-radius:8px;padding:14px}
.cb h3{font-size:.85rem;color:var(--dim);margin-bottom:10px;font-weight:500}
.cb canvas{width:100%!important}

/* tables */
.dt{width:100%;border-collapse:collapse;margin-top:14px;font-size:.88rem}
.dt th{text-align:left;padding:9px 12px;color:var(--dim);font-weight:500;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.dt td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.dt tr:hover{background:rgba(255,255,255,.02)}
.dt .mo{font-family:'SF Mono','Fira Code',monospace;font-size:.82rem}
.r2g{color:var(--green)}.r2w{color:var(--yellow)}.r2b{color:var(--red)}

/* analysis */
.ab{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:8px;padding:18px;margin-top:18px}
.ab h3{color:var(--cyan);font-size:.95rem;margin-bottom:10px}
.ab p{color:#8899aa;line-height:1.7;font-size:.88rem}
.ab code{background:rgba(0,212,255,.1);padding:1px 5px;border-radius:3px;font-size:.82rem;color:var(--cyan)}
.ab.warn-box{border-color:rgba(255,215,64,.2);background:rgba(255,215,64,.03)}
.ab.warn-box h3{color:var(--yellow)}
.ab.skip-box{border-color:rgba(179,136,255,.2);background:rgba(179,136,255,.03)}
.ab.skip-box h3{color:var(--purple)}

.ft{text-align:center;padding:36px 0;color:#2a3a4a;font-size:.82rem;border-top:1px solid rgba(255,255,255,.04);margin-top:36px}
</style>
</head>
<body>

<div class="hdr">
  <h1>🔬 Ascend 310P3 微架构参数测定</h1>
  <p class="sub">DaVinci AI Core μBench · CANN 8.2.RC1 · 2026-06-07</p>
</div>

<div class="ctr" id="app"></div>

<div class="ft">

  <p style="margin-top:3px">CANN 8.2.RC1 · g++ 10.3.1 · bisheng (Ascend C compiler)</p>
</div>

      "name": "cube_tile_latency",
      "status": "skipped",
      "label": "cube tile latency",
      "tooltip": "310P Matmul 模板挂起，已跳过",
      "lab_mapping": "Cube N/A — 待 910B 验证"
    },
    {
      "name": "cube_throughput",
      "status": "skipped",
      "label": "cube throughput",
      "tooltip": "310P Matmul 模板挂起，已跳过",
      "lab_mapping": "Cube N/A — 待 910B 验证"
    },
    {
      "name": "cube_scaling",
      "status": "skipped",
      "label": "cube scaling",
      "tooltip": "310P Matmul 模板挂起，已跳过",
      "lab_mapping": "Cube N/A — 待 910B 验证"
    }
  ]
}
</script>

<script>
"use strict";

/* ── 读取 EMBEDDED_DATA ──────────────────────────────────────────────── */
const DATA = JSON.parse(document.getElementById('EMBEDDED_DATA').textContent);
const META = DATA.meta;
const KC   = META.kernel_constants;
const BENCH = DATA.benchmarks;

const byName = Object.fromEntries(BENCH.map(b => [b.name, b]));
const ok     = BENCH.filter(b => b.status === 'ok');
const mte    = BENCH.filter(b => b.name.startsWith('mte_'));
const vec    = BENCH.filter(b => b.name.startsWith('vector_'));
const scl    = BENCH.filter(b => b.name.startsWith('scalar_'));
const cube   = BENCH.filter(b => b.name.startsWith('cube_'));

/* ── deriveMetric: 从 EMBEDDED_DATA.derived 读取，不再重新算 ────────── */
function dv(b, key, fallback) {
  return (b.derived && b.derived[key] !== undefined) ? b.derived[key] : fallback;
}
function primary(b) {
  if (b.status !== 'ok') return { v: '—', u: '', lb: '' };
  return { v: dv(b, primary_v_key(b), '—'), u: dv(b, 'primary_unit', 'μs/op'), lb: dv(b, 'primary_label', '') };
}
function primary_v_key(b) {
  if (b.derived && b.derived.bandwidth_gbs !== undefined) return 'primary_value';
  if (b.derived && b.derived.gflops !== undefined) return 'primary_value';
  if (b.derived && b.derived.latency_ns !== undefined) return 'primary_value';
  return 'primary_value';
}

/* ── 辅助 ──────────────────────────────────────────────────────────────── */
function r2cls(v) { return v >= 0.99 ? 'r2g' : v >= 0.95 ? 'r2w' : 'r2b'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ── 渲染概览卡片 ─────────────────────────────────────────────────────── */
function renderMetrics() {
  let h = '<div class="mg">';

  // MTE copy BW
  const mc = byName['mte_copy_bw'];
  h += `<div class="mc mte" title="${esc(KC.mte_copy_bw.tooltip)}">
    <div class="lb">MTE 拷贝带宽</div>
    <div class="vl">${dv(mc,'primary_value','—')}</div>
    <div class="un">${dv(mc,'primary_unit','GB/s')} · ${esc(KC.mte_copy_bw.lab_mapping)}</div>
  </div>`;

  // MTE startup
  const ms = byName['mte_startup_latency'];
  h += `<div class="mc mte" title="${esc(KC.mte_startup_latency.tooltip)}">
    <div class="lb">${esc(KC.mte_startup_latency.label)}</div>
    <div class="vl">${dv(ms,'primary_value','—')}</div>
    <div class="un">${dv(ms,'primary_unit','ns')} · ${esc(KC.mte_startup_latency.lab_mapping)}</div>
  </div>`;

  // V1 Add latency
  const v1 = byName['vector_add_latency'];
  h += `<div class="mc vec" title="${esc(KC.vector_add_latency.tooltip)}">
    <div class="lb">${esc(KC.vector_add_latency.label)}</div>
    <div class="vl">${dv(v1,'primary_value','—')}</div>
    <div class="un">${dv(v1,'primary_unit','ns')} · ${esc(KC.vector_add_latency.lab_mapping)}</div>
  </div>`;

  // V3 throughput
  const v3 = byName['vector_throughput'];
  h += `<div class="mc vec" title="${esc(KC.vector_throughput.tooltip)}">
    <div class="lb">${esc(KC.vector_throughput.label)}</div>
    <div class="vl">${dv(v3,'primary_value','—')}</div>
    <div class="un">${dv(v3,'primary_unit','GFLOPS')} · ${dv(v3,'ops_per_cycle','—')} ops/cycle @1GHz</div>
  </div>`;

  // scalar arith — 带警告
  const s1 = byName['scalar_arith_latency'];
  h += `<div class="mc scl warn" title="${esc(KC.scalar_arith_latency.unreliable_reason)}">
    <div class="lb">${esc(KC.scalar_arith_latency.label)}</div>
    <div class="vl">${dv(s1,'primary_value','—')}</div>
    <div class="un">${dv(s1,'primary_unit','ns')} · R²=${s1.r2}</div>
    <div class="warn-tag">⚠ 低可信度: ${esc(KC.scalar_arith_latency.unreliable_reason)}</div>
  </div>`;

  // Cube
  h += `<div class="mc cub" title="310P Matmul 模板挂起，已跳过">
    <div class="lb">Cube 矩阵乘法</div>
    <div class="vl" style="font-size:1.3rem">310P 不支持</div>
    <div class="un">已跳过 · 待 910B 验证</div>
  </div>`;

  h += '</div>';
  return h;
}

/* ── 渲染测试配置 ──────────────────────────────────────────────────────── */
function renderConfig() {
  const rp = META.run_params;
  return `<div class="sec"><div class="sh"><div class="ic" style="background:rgba(255,255,255,.08)">⚙️</div><h2>测试配置 & 推导公式</h2></div><div class="sb"><div class="cg">
    <div class="cb" style="background:transparent"><h3>运行参数</h3><table class="dt" style="margin-top:0">
      <tr><td>device</td><td class="mo">${rp.device}</td></tr>
      <tr><td>warmup / iters</td><td class="mo">${rp.warmup} / ${rp.iters}</td></tr>
      <tr><td>blocks</td><td class="mo">${rp.blocks}</td></tr>
      <tr><td>repeats sweep</td><td class="mo">${rp.repeats_sweep.join(', ')}</td></tr>
      <tr><td>size_bytes</td><td class="mo">${rp.size_bytes} (${rp.size_bytes/1024} KB)</td></tr>
    </table></div>
    <div class="cb" style="background:transparent"><h3>推导公式（与 kernel 常量一致）</h3><table class="dt" style="margin-top:0">
      <tr><td>MTE 带宽</td><td class="mo">blocks×kTileBytes×2 / slope = ${KC.mte_copy_bw.blocks}×1024×2 / slope_us</td></tr>
      <tr><td>Vector GFLOPS</td><td class="mo">blocks×lanes×elems / slope = ${KC.vector_throughput.blocks}×${KC.vector_throughput.lanes}×${KC.vector_throughput.elems} / slope_us</td></tr>
      <tr><td>Vector ops/cycle</td><td class="mo">blocks×lanes / (slope_us×1000) @1GHz</td></tr>
    </table></div>
  </div></div></div>`;
}

/* ── 渲染单个 benchmark section ────────────────────────────────────────── */
function renderSection(title, icon, iconCls, items, badgeText, badgeCls) {
  let h = `<div class="sec"><div class="sh"><div class="ic ${iconCls}">${icon}</div><h2>${esc(title)}</h2><span class="bd ${badgeCls}">${esc(badgeText)}</span></div><div class="sb">`;

  // 图表
  h += '<div class="cg">';
  for (const b of items) {
    if (b.status !== 'ok') continue;
    const cid = `chart_${b.name}`;
    h += `<div class="cb"><h3>time(N) — ${esc(b.label)} (${esc(dv(b,'primary_unit','μs/op'))})</h3><canvas id="${cid}" height="240"></canvas></div>`;
  }
  h += '</div>';

  // 分析
  h += renderAnalysis(items);

  // 数据表
  h += renderTable(items);

  h += '</div></div>';
  return h;
}

function renderAnalysis(items) {
  let h = '';
  for (const b of items) {
    if (b.status !== 'ok') continue;
    const kc = KC[b.name] || {};
    h += `<div class="ab${b.unreliable ? ' warn-box' : ''}">
      <h3>📊 ${esc(b.label)}${b.unreliable ? ' ⚠️ 低可信度' : ''}</h3>
      <p>`;

    if (b.unreliable) {
      h += `<strong>⚠ 警告</strong>: ${esc(b.unreliable_reason)}<br>本指标不作为正式 KPI，仅供参考。<br>`;
    }

    if (b.name === 'mte_copy_bw') {
      const d = b.derived;
      h += `<strong>带宽</strong>: 每 repeat 搬运 ${KC.mte_copy_bw.blocks}×${KC.mte_copy_bw.bytes_per_repeat_per_block}B = ${KC.mte_copy_bw.blocks*KC.mte_copy_bw.bytes_per_repeat_per_block}B → <code>${d.primary_value} ${d.primary_unit}</code><br>`;
      h += `公式: ${KC.mte_copy_bw.blocks} blocks × 1024B × 2 (GM→UB→GM) / ${b.slope_us}μs`;
    } else if (b.name === 'mte_startup_latency') {
      h += `32B 完整 DataCopy 往返延迟 <code>${b.derived.primary_value} ns</code>。`;
      h += `非纯 M8 DMA 启动开销，含 GM→UB→GM 全路径。`;
    } else if (b.name === 'mte_granularity') {
      h += `mode=0 最小粒度 (32B) 延迟 <code>${b.derived.primary_value} ns</code>。`;
      h += `非 Lab2 M7 容量曲线。`;
    } else if (b.name === 'vector_throughput') {
      const d = b.derived;
      h += `每 repeat: ${KC.vector_throughput.blocks} blocks × ${KC.vector_throughput.lanes} lanes × ${KC.vector_throughput.elems} elems = <strong>${d.total_ops_per_repeat} FP32 ops</strong><br>`;
      h += `GFLOPS = ${d.total_ops_per_repeat} / ${b.slope_us}μs ≈ <strong>${d.primary_value} GFLOPS</strong><br>`;
      h += `ops/cycle = ${KC.vector_throughput.blocks*KC.vector_throughput.lanes} / (${b.slope_us}μs × 1GHz) ≈ <strong>${d.ops_per_cycle} ops/cycle</strong><br>`;
      h += `注: 含 DataCopy + PipeBarrier 开销，未满占流水线，~${(d.gflops/100).toFixed(0)}% 峰值。`;
    } else if (b.name === 'vector_add_latency' || b.name === 'vector_mul_latency') {
      h += `RAW 依赖链延迟 <code>${b.derived.primary_value} ns</code>，含 PipeBarrier 同步。`;
    } else if (b.name === 'vector_pipeline_depth') {
      h += `依赖 Add + 独立 gap ops，斜率 <code>${b.derived.primary_value} ns</code>。与纯依赖 Add 接近，gap ops 被管线隐藏。`;
    } else if (b.name === 'scalar_arith_latency') {
      h += `LCG 每步 <code>${b.derived.primary_value} ns</code>。R²=${b.r2}，baseline 与 target 成本接近。`;
    } else if (b.name === 'scalar_branch_overhead') {
      h += `条件分支开销 <code>${b.derived.primary_value} ns</code>，R²=${b.r2} 可信。非 S3 访存延迟。`;
    }

    if (kc.lab_mapping) {
      h += `<br><em style="color:var(--dim)">Lab 映射: ${esc(kc.lab_mapping)}</em>`;
    }
    h += '</p></div>';
  }
  return h;
}

function renderTable(items) {
  const okItems = items.filter(b => b.status === 'ok');
  if (!okItems.length) return '';
  let h = '<table class="dt"><thead><tr><th>基准</th><th>repeat</th><th>total (μs)</th><th>baseline (μs)</th><th>adjusted (μs)</th><th>斜率</th><th>R²</th><th>派生</th></tr></thead><tbody>';
  for (const b of okItems) {
    for (let i = 0; i < b.sweep.length; i++) {
      const s = b.sweep[i];
      h += '<tr>';
      if (i === 0) h += `<td rowspan="${b.sweep.length}">${esc(b.name)}</td>`;
      h += `<td class="mo">${s.repeat}</td><td class="mo">${s.total_us.toFixed(2)}</td><td class="mo">${s.baseline_us.toFixed(2)}</td><td class="mo">${s.adjusted_us.toFixed(2)}</td>`;
      if (i === 0) {
        h += `<td rowspan="${b.sweep.length}" class="mo">${b.slope_us}</td>`;
        h += `<td rowspan="${b.sweep.length}" class="${r2cls(b.r2)}">${b.r2}</td>`;
        h += `<td rowspan="${b.sweep.length}" class="mo">${b.derived.primary_value} ${b.derived.primary_unit}</td>`;
      }
      h += '</tr>';
    }
  }
  h += '</tbody></table>';
  return h;
}

/* ── 渲染 Cube section ─────────────────────────────────────────────────── */
function renderCube() {
  return `<div class="sec"><div class="sh"><div class="ic cub">🧮</div><h2>Cube — 矩阵乘法单元 (Matrix Multiply Unit)</h2><span class="bd bd-skip">310P 不支持 · 已跳过</span></div><div class="sb">
    <div class="ab skip-box">
      <h3>310P 环境不支持，已跳过</h3>
      <p>
        三个 Cube 基准 (<code>cube_tile_latency</code>, <code>cube_throughput</code>, <code>cube_scaling</code>) 在 310P3 (m200) 上因
        <code>lib/matmul_intf.h</code> 的 <code>Matmul</code> 模板兼容性问题会挂起（进程卡在 <code>logic_cq_wait_event</code>）。<br><br>
        <strong>具体原因</strong>: <code>IterateAll()</code> 内部 v200 代码路径对地址 0 执行 <code>DataCacheCleanAndInvalid</code> 导致硬件挂起；
        即使传入正确 <code>TCubeTiling</code>，调度器仍无法初始化。<br><br>
        <strong>处理</strong>: 在 310P 上自动跳过，不阻塞其他基准。待 910B 环境验证。<br>
        <strong>注意</strong>: 未修改任何 Cube 内核源码。
      </p>
    </div>
  </div></div>`;
}

/* ── 渲染综合对比 ──────────────────────────────────────────────────────── */
function renderOverview() {
  return `<div class="sec"><div class="sh"><div class="ic" style="background:rgba(0,212,255,.15)">📈</div><h2>综合对比 — 所有微架构参数</h2></div><div class="sb">
    <div class="cg">
      <div class="cb"><h3>派生指标对比</h3><canvas id="overview_derived" height="280"></canvas></div>
      <div class="cb"><h3>拟合质量 R²</h3><canvas id="overview_r2" height="280"></canvas></div>
    </div>
    <div class="ab" style="margin-top:18px">
      <h3>⚠ 310P 免责声明</h3>
      <p>${esc(META.disclaimer)}</p>
    </div>
  </div></div>`;
}

/* ── Chart.js 绘图 ─────────────────────────────────────────────────────── */
const CO = (yl) => ({
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#8899aa',font:{size:10}}}},
  scales:{
    x:{title:{display:true,text:'repeat',color:'#5a6a7a'},ticks:{color:'#5a6a7a'},grid:{color:'rgba(255,255,255,.04)'}},
    y:{title:{display:true,text:yl,color:'#5a6a7a'},ticks:{color:'#5a6a7a'},grid:{color:'rgba(255,255,255,.04)'}}
  }
});

function drawFit(cid, b, color) {
  const el = document.getElementById(cid);
  if (!el) return;
  const sw = b.sweep;
  const reps = sw.map(s=>s.repeat);
  const fitY = reps.map(x => b.slope_us * x + b.intercept_us);
  new Chart(el.getContext('2d'), {
    type:'line',
    data:{
      labels: reps,
      datasets:[
        {label:'total (μs)', data:sw.map(s=>s.total_us), borderColor:color, backgroundColor:color+'33', pointRadius:4, borderWidth:2, tension:0},
        {label:'baseline (μs)', data:sw.map(s=>s.baseline_us), borderColor:'#5a6a7a', borderDash:[5,5], pointRadius:2, borderWidth:1.2, tension:0},
        {label:`fit: y=${b.slope_us}·x+${b.intercept_us.toFixed(1)}`, data:fitY, borderColor:color+'88', borderDash:[2,2], pointRadius:0, borderWidth:1}
      ]
    },
    options: CO('time (μs)')
  });
}

function drawCharts() {
  const COLORS = {mte_copy_bw:'#ff5252',mte_startup_latency:'#ff9100',mte_granularity:'#ff6d00',
    vector_add_latency:'#00e676',vector_mul_latency:'#00d4ff',vector_throughput:'#00bfa5',vector_pipeline_depth:'#64ffda',
    scalar_arith_latency:'#ffd740',scalar_branch_overhead:'#ff9100'};

  for (const b of ok) {
    drawFit(`chart_${b.name}`, b, COLORS[b.name] || '#888');
  }

  // overview: derived bar chart
  const okNoScalar = ok.filter(b => !b.unreliable);
  const labels = okNoScalar.map(b => b.label);
  const vals = okNoScalar.map(b => {
    if (b.derived.bandwidth_gbs) return b.derived.bandwidth_gbs;
    if (b.derived.gflops) return b.derived.gflops;
    return b.derived.latency_ns || 0;
  });
  const units = okNoScalar.map(b => b.derived.primary_unit || '');
  const colors = okNoScalar.map(b => COLORS[b.name] || '#888');

  const el1 = document.getElementById('overview_derived');
  if (el1) {
    new Chart(el1.getContext('2d'), {
      type:'bar',
      data:{labels, datasets:[{label:'派生值',data:vals,backgroundColor:colors.map(c=>c+'88'),borderColor:colors,borderWidth:2}]},
      options:{...CO('派生值 (混合单位: GB/s, GFLOPS, ns)'),
        plugins:{...CO('').plugins,tooltip:{callbacks:{label:(ctx)=>`${ctx.parsed.y} ${units[ctx.dataIndex]}`}}}}
    });
  }

  // overview: R² bar chart
  const allLabels = ok.map(b=>b.label);
  const r2s = ok.map(b=>b.r2);
  const r2colors = r2s.map(v=>v>=0.99?'#00e67688':v>=0.95?'#ffd74088':'#ff525288');
  const r2borders = r2s.map(v=>v>=0.99?'#00e676':v>=0.95?'#ffd740':'#ff5252');

  const el2 = document.getElementById('overview_r2');
  if (el2) {
    new Chart(el2.getContext('2d'), {
      type:'bar',
      data:{labels:allLabels,datasets:[{label:'R²',data:r2s,backgroundColor:r2colors,borderColor:r2borders,borderWidth:2}]},
      options:{...CO('R²'),scales:{x:CO('').scales.x,y:{min:0.9,max:1.0005,ticks:{color:'#5a6a7a'},grid:{color:'rgba(255,255,255,.04)'}}}}
    });
  }
}

/* ── 主渲染 ────────────────────────────────────────────────────────────── */
function render() {
  let html = '';
  html += renderMetrics();
  html += renderConfig();

  // MTE
  html += renderSection('MTE — 内存拷贝引擎 (Data Move Unit)', '📦', 'mte',
    mte, `${mte.filter(b=>b.status==='ok').length}/${mte.length} 通过`, 'bd-ok');

  // Vector
  html += renderSection('Vector — 向量计算单元 (Vector Processing Unit)', '⚡', 'vec',
    vec, `${vec.filter(b=>b.status==='ok').length}/${vec.length} 通过`, 'bd-ok');

  // Scalar
  html += renderSection('Scalar — 标量处理单元 (Scalar Unit)', '🔢', 'scl',
    scl, `${scl.filter(b=>b.status==='ok').length}/${scl.length} 通过 (1 项低可信度)`, 'bd-warn');

  // Cube
  html += renderCube();

  // Overview
  html += renderOverview();

  document.getElementById('app').innerHTML = html;
  drawCharts();
}

render();
</script>
</body>
</html>
