<meta charset="UTF-8">

<title>Lab2 μBench — Ascend 910B 微架构参数测定</title>

<style>
:root{
  --bg:#0b0f18;--card:#121a28;--border:rgba(255,255,255,.07);
  --text:#d0dce8;--dim:#6b7c8f;--cyan:#00d4ff;--green:#00e676;
  --red:#ff5252;--orange:#ff9100;--yellow:#ffd740;--purple:#b388ff;
  --mte:#ff6b6b;--vec:#00e676;--scl:#ffd740;--cub:#b388ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.hdr{background:linear-gradient(135deg,#0d1b2a,#162436);border-bottom:1px solid rgba(0,212,255,.12);padding:28px 20px;text-align:center}
.hdr h1{font-size:1.75rem;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--dim);font-size:.85rem;margin-top:4px}
.ctr{max-width:1280px;margin:0 auto;padding:20px 16px 40px}

/* 覆盖率条 */
.cov{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:18px}
.cov h2{font-size:.95rem;margin-bottom:10px}
.cov-bar{display:flex;height:22px;border-radius:6px;overflow:hidden;background:rgba(0,0,0,.3)}
.cov-seg{transition:width .3s}
.cov-seg.m{background:var(--green)}.cov-seg.p{background:var(--yellow)}.cov-seg.s{background:var(--purple)}.cov-seg.x{background:rgba(255,255,255,.08)}
.cov-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:.78rem;color:var(--dim)}
.cov-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px;vertical-align:middle}
.cov-legend .m::before{background:var(--green)}.cov-legend .p::before{background:var(--yellow)}
.cov-legend .s::before{background:var(--purple)}.cov-legend .x::before{background:rgba(255,255,255,.15)}

/* KPI */
.kpi{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.kpi .k{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.kpi .n{font-size:1.6rem;font-weight:700;color:var(--cyan)}
.kpi .l{font-size:.72rem;color:var(--dim);margin-top:2px}

/* 区块 */
.sec{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:16px;overflow:hidden}
.sh{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sh h2{font-size:1rem;font-weight:600}
.sh .bd{margin-left:auto;font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}
.bd-ok{background:rgba(0,230,118,.15);color:var(--green)}
.bd-warn{background:rgba(255,215,64,.15);color:var(--yellow)}
.bd-skip{background:rgba(179,136,255,.15);color:var(--purple)}
.sb{padding:14px 16px}

/* Lab2 参数表 */
.dt{width:100%;border-collapse:collapse;font-size:.82rem}
.dt th{text-align:left;padding:8px 10px;color:var(--dim);font-weight:500;font-size:.72rem;text-transform:uppercase;border-bottom:1px solid var(--border)}
.dt td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:top}
.dt tr:hover{background:rgba(255,255,255,.02)}
.dt .id{font-family:monospace;font-weight:700;width:36px}
.dt .mo{font-family:'SF Mono',monospace;font-size:.8rem}
.st{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:600}
.st-measured{background:rgba(0,230,118,.15);color:var(--green)}
.st-partial{background:rgba(255,215,64,.15);color:var(--yellow)}
.st-skipped{background:rgba(179,136,255,.15);color:var(--purple)}
.st-missing{background:rgba(255,255,255,.06);color:var(--dim)}
.cat-mte{color:var(--mte)}.cat-Vector{color:var(--vec)}.cat-Scalar{color:var(--scl)}.cat-Cube{color:var(--cub)}
.r2g{color:var(--green)}.r2w{color:var(--yellow)}.r2b{color:var(--red)}

/* 图表 */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:800px){.cg{grid-template-columns:1fr}}
.cb{background:rgba(0,0,0,.22);border-radius:8px;padding:10px 12px}
.cb h3{font-size:.78rem;color:var(--dim);margin-bottom:6px}
.chart-wrap{position:relative;height:200px;width:100%}
.chart-wrap.sm{height:110px}
.chart-wrap canvas{display:block;max-height:100%!important}

.bench-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.bench-card{background:rgba(0,0,0,.2);border:1px solid var(--border);border-radius:8px;padding:8px 10px}
.bench-card h4{font-size:.75rem;margin-bottom:2px}
.bench-card .meta{font-size:.68rem;color:var(--dim);margin-bottom:4px}

details.coll{margin-bottom:12px}
details.coll summary{cursor:pointer;list-style:none;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:.88rem;font-weight:600}
details.coll summary::-webkit-details-marker{display:none}
details.coll summary::before{content:'▸ ';color:var(--cyan)}
details.coll[open] summary::before{content:'▾ '}
details.coll .coll-body{padding:10px 0 4px}

.ab{font-size:.82rem;color:var(--dim);padding:12px;background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.08);border-radius:8px;margin-top:12px}
.ft{text-align:center;padding:24px;color:#3a4a5a;font-size:.78rem}
</style>
</head>

const byName = Object.fromEntries(BENCH.map(b => [b.name, b]));
const COV = META.coverage || {};

const CAT_COLOR = { MTE:'#ff6b6b', Vector:'#00e676', Scalar:'#ffd740', Cube:'#b388ff' };
const BENCH_COLOR = {
  mte_copy_bw:'#ff5252', mte_startup_latency:'#ff9100', mte_granularity:'#ff6d00',
  vector_add_latency:'#00e676', vector_mul_latency:'#00d4ff', vector_throughput:'#00bfa5',
  vector_pipeline_depth:'#64ffda', scalar_arith_latency:'#ffd740', scalar_branch_overhead:'#ffab40'
};

function esc(s){ const d=document.createElement('div'); d.textContent=s??''; return d.innerHTML; }
function r2cls(v){ return v>=0.99?'r2g':v>=0.95?'r2w':'r2b'; }
function stCls(s){ return 'st st-'+s; }

function renderCoverage(){
  const t = COV.lab2_total || 21;
  const m = COV.measured||0, p = COV.partial||0, s = COV.skipped||0, x = COV.missing||0;
  const pct = v => (v/t*100).toFixed(1)+'%';
  return `<div class="cov">
    <h2>Lab2 参数覆盖率（共 ${t} 项：S1–S3 · V1–V5 · C1–C5 · M1–M8）</h2>
    <div class="cov-bar">
      <div class="cov-seg m" style="width:${pct(m)}" title="已测定 ${m}"></div>
      <div class="cov-seg p" style="width:${pct(p)}" title="近似 ${p}"></div>
      <div class="cov-seg s" style="width:${pct(s)}" title="跳过 ${s}"></div>
      <div class="cov-seg x" style="width:${pct(x)}" title="未实现 ${x}"></div>
    </div>
    <div class="cov-legend">
      <span class="m">已测定 ${m}</span>
      <span class="p">近似/探针 ${p}</span>
      <span class="s">跳过 ${s}</span>
      <span class="x">未实现 ${x}</span>
      <span style="margin-left:auto">μbench: ${COV.benchmarks_ok||0}/${COV.benchmarks_total||12} 通过</span>
    </div>
  </div>`;
}

function renderKPI(){
  const m1 = LAB2.find(p=>p.id==='M1');
  const v1 = LAB2.find(p=>p.id==='V1');
  const v3 = LAB2.find(p=>p.id==='V3');
  const s1 = LAB2.find(p=>p.id==='S1');
  return `<div class="kpi">
    <div class="k"><div class="n">${COV.measured||0}</div><div class="l">Lab2 已测定</div></div>
    <div class="k"><div class="n" style="color:var(--mte)">${m1?m1.display.split(' ')[0]:'—'}</div><div class="l">M1 带宽</div></div>
    <div class="k"><div class="n" style="color:var(--vec)">${v1?v1.display.split(' ')[0]:'—'}</div><div class="l">V1 Add 延迟</div></div>
    <div class="k"><div class="n" style="color:var(--vec)">${v3?v3.display.split(' ')[0]:'—'}</div><div class="l">V3 吞吐</div></div>
    <div class="k"><div class="n" style="color:var(--scl)">${s1?s1.display.split(' ')[0]:'—'}</div><div class="l">S1 标量延迟</div></div>
    <div class="k"><div class="n" style="color:var(--purple)">${COV.skipped||0}</div><div class="l">Cube 跳过</div></div>
  </div>`;
}

function renderLab2Table(){
  let h = `<div class="sec"><div class="sh"><h2>📋 Lab2 必测参数（21 项）</h2><span class="bd bd-ok">${COV.measured||0} 测定 · ${COV.partial||0} 近似</span></div><div class="sb">
    <table class="dt"><thead><tr>
      <th>ID</th><th>类别</th><th>参数名称</th><th>单位</th><th>测定值</th><th>状态</th><th>R²</th><th>说明</th>
    </tr></thead><tbody>`;
  for (const p of LAB2){
    const stLabel = {measured:'已测定',partial:'近似',skipped:'跳过',missing:'未实现'}[p.status]||p.status;
    h += `<tr>
      <td class="id">${p.id}</td>
      <td class="cat-${p.cat}">${p.cat}</td>
      <td>${esc(p.name)}</td>
      <td class="mo">${esc(p.unit)}</td>
      <td class="mo">${esc(p.display)}</td>
      <td><span class="${stCls(p.status)}">${stLabel}</span></td>
      <td class="${p.r2!=null?r2cls(p.r2):''}">${p.r2!=null?p.r2.toFixed(4):'—'}</td>
      <td style="font-size:.75rem;color:var(--dim)">${esc(p.note||'')}</td>
    </tr>`;
  }
  h += '</tbody></table></div></div>';
  return h;
}

function renderCategoryCharts(){
  return `<div class="sec"><div class="sh"><h2>📈 分类对比图</h2></div><div class="sb"><div class="cg">
    <div class="cb"><h3>延迟类 (cycles) — V1/V2/V4/S1/M8</h3><div class="chart-wrap"><canvas id="ch_lat"></canvas></div></div>
    <div class="cb"><h3>带宽 & 吞吐 — M1 / V3 GFLOPS</h3><div class="chart-wrap"><canvas id="ch_bw_tp"></canvas></div></div>
    <div class="cb"><h3>各类别 Lab2 完成度</h3><div class="chart-wrap"><canvas id="ch_cov"></canvas></div></div>
    <div class="cb"><h3>μbench 拟合 R²</h3><div class="chart-wrap"><canvas id="ch_r2"></canvas></div></div>
  </div></div></div>`;
}

function renderFitGrid(){
  let h = `<div class="sec"><div class="sh"><h2>📐 线性拟合验证</h2><span class="bd bd-ok">Y = adjusted/repeat (μs/op)</span></div><div class="sb">
    <p style="font-size:.78rem;color:var(--dim);margin-bottom:10px">单位成本应接近水平线（= 调整后斜率）。仅展示已通过 μbench。</p>
    <div class="bench-grid">`;
  for (const b of ok){
    const d = b.derived||{};
    const line = d.primary_value ? `${d.primary_value} ${d.primary_unit}` : `${b.slope_us} μs/op`;
    h += `<div class="bench-card">
      <h4>${esc(b.label)} <span style="color:var(--dim);font-weight:400">(${esc(b.name)})</span></h4>
      <div class="meta">${esc(line)} · R²=${b.r2.toFixed(4)}</div>
      <div class="chart-wrap sm"><canvas id="fit_${b.name}"></canvas></div>
    </div>`;
  }
  h += '</div></div></div>';
  return h;
}

function renderRaw(){
  let t = '<table class="dt"><thead><tr><th>benchmark</th><th>repeat</th><th>total μs</th><th>baseline μs</th><th>adjusted μs</th><th>μs/op</th></tr></thead><tbody>';
  for (const b of ok){
    b.sweep.forEach((s,i)=>{
      t += '<tr>';
      if(i===0) t += `<td rowspan="${b.sweep.length}">${esc(b.name)}</td>`;
      t += `<td class="mo">${s.repeat}</td><td class="mo">${s.total_us.toFixed(1)}</td><td class="mo">${s.baseline_us.toFixed(1)}</td>
        <td class="mo">${s.adjusted_us.toFixed(2)}</td><td class="mo">${(s.adjusted_us/s.repeat).toFixed(4)}</td></tr>`;
    });
  }
  t += '</tbody></table>';
  const rp = META.run_params||{};
  return `<details class="coll"><summary>⚙️ 运行参数 & 原始 sweep 数据</summary><div class="coll-body">
    <p class="ab" style="margin-top:0">device=${rp.device} · warmup=${rp.warmup} · iters=${rp.iters} · blocks=${rp.blocks} · repeats=${(rp.repeats_sweep||[]).join(',')} · size=${rp.size_bytes}B · @${META.freq_ghz||1.5}GHz</p>
    ${t}</div></details>`;
}

const AX = {
  x:{ticks:{color:'#6b7c8f',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}},
  y:{ticks:{color:'#6b7c8f',font:{size:9}},grid:{color:'rgba(255,255,255,.04)'}}
};

function drawPerOp(cid, b, color){
  const el = document.getElementById(cid);
  if(!el||typeof Chart==='undefined') return;
  const reps = b.sweep.map(s=>s.repeat);
  const perOp = b.sweep.map(s=>s.adjusted_us/s.repeat);
  const slope = b.slope_us;
  const flat = reps.map(()=>slope);
  const vals = perOp.filter(v=>isFinite(v));
  const pad = (Math.max(...vals,slope)-Math.min(...vals,slope))*0.2 || slope*0.1 || 0.001;
  new Chart(el.getContext('2d'),{
    type:'line',
    data:{labels:reps,datasets:[
      {data:perOp,borderColor:color,pointRadius:3,borderWidth:2,tension:0},
      {data:flat,borderColor:'#6b7c8f',borderDash:[4,3],pointRadius:0,borderWidth:1}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{...AX.x,title:{display:true,text:'repeat',color:'#6b7c8f',font:{size:9}}},
        y:{...AX.y,min:Math.min(...vals,slope)-pad,max:Math.max(...vals,slope)+pad,
          title:{display:true,text:'μs/op',color:'#6b7c8f',font:{size:9}}}}}
  });
}

function drawHBar(cid, labels, vals, colors, unit, xmin, xmax){
  const el = document.getElementById(cid);
  if(!el||typeof Chart==='undefined'||!labels.length) return;
  const scale = { ...AX.x, title:{display:true,text:unit,color:'#6b7c8f',font:{size:9}} };
  if(xmin!=null) scale.min = xmin;
  if(xmax!=null) scale.max = xmax;
  new Chart(el.getContext('2d'),{
    type:'bar',data:{labels,datasets:[{data:vals,backgroundColor:colors.map(c=>c+'99'),borderColor:colors,borderWidth:1.5}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:scale,y:{...AX.y,ticks:{font:{size:8},color:'#6b7c8f'}}}}
  });
}

function drawCharts(){
  if(typeof Chart==='undefined') return;

  // 延迟 cycles
  const latParams = LAB2.filter(p=>['V1','V2','V4','S1','M8'].includes(p.id) && p.value!=null);
  drawHBar('ch_lat', latParams.map(p=>p.id+' '+p.name.split(' ').slice(0,2).join(' ')),
    latParams.map(p=>typeof p.value==='number'?p.value:0),
    latParams.map(p=>CAT_COLOR[p.cat]), 'cycles');

  // 带宽 + GFLOPS
  const m1 = LAB2.find(p=>p.id==='M1');
  const v3b = byName['vector_throughput'];
  const bwLabels=[], bwVals=[], bwColors=[];
  if(m1&&m1.value){ bwLabels.push('M1 带宽'); bwVals.push(m1.value); bwColors.push(CAT_COLOR.MTE); }
  if(v3b&&v3b.derived&&v3b.derived.gflops){ bwLabels.push('V3 GFLOPS'); bwVals.push(v3b.derived.gflops); bwColors.push(CAT_COLOR.Vector); }
  drawHBar('ch_bw_tp', bwLabels, bwVals, bwColors, 'value');

  // 各类别完成度 stacked counts
  const cats = ['Scalar','Vector','Cube','MTE'];
  const measured = cats.map(c=>LAB2.filter(p=>p.cat===c&&p.status==='measured').length);
  const partial = cats.map(c=>LAB2.filter(p=>p.cat===c&&p.status==='partial').length);
  const skipped = cats.map(c=>LAB2.filter(p=>p.cat===c&&p.status==='skipped').length);
  const missing = cats.map(c=>LAB2.filter(p=>p.cat===c&&p.status==='missing').length);
  const elCov = document.getElementById('ch_cov');
  if(elCov){
    new Chart(elCov.getContext('2d'),{
      type:'bar',
      data:{labels:cats,datasets:[
        {label:'已测定',data:measured,backgroundColor:'#00e67699'},
        {label:'近似',data:partial,backgroundColor:'#ffd74099'},
        {label:'跳过',data:skipped,backgroundColor:'#b388ff99'},
        {label:'未实现',data:missing,backgroundColor:'#ffffff22'}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{labels:{color:'#8899aa',font:{size:9}}}},
        scales:{x:{...AX.x,stacked:true},y:{...AX.y,stacked:true,max:8}}}
    });
  }

  drawHBar('ch_r2', ok.map(b=>b.label), ok.map(b=>b.r2),
    ok.map(b=>b.r2>=0.99?'#00e676':'#ffd740'), 'R²', 0.9, 1.0001);

  for(const b of ok) drawPerOp('fit_'+b.name, b, BENCH_COLOR[b.name]||'#888');
}

function render(){
  document.getElementById('hdr-sub').textContent =
    `${META.platform||'Ascend'} · ${META.cann_version||''} · ${META.date||''} · @${META.freq_ghz||1.5}GHz`;

  document.getElementById('app').innerHTML =
    renderCoverage() + renderKPI() + renderLab2Table() +
    renderCategoryCharts() + renderFitGrid() + renderRaw() +
    `<div class="ab">${esc(META.disclaimer||'')}</div>`;

  if(typeof Chart==='undefined'){
    document.getElementById('app').insertAdjacentHTML('afterbegin',
      '<div class="ab" style="border-color:#ffd740">⚠ 未加载 chart.umd.min.js，图表不可用</div>');
    return;
  }
  try{ drawCharts(); }catch(e){ console.error(e); }
}
render();
</script>
</body>
</html>
