<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ascend 310P3 μBench 微架构参数测定报告</title>
<script src="chart.umd.min.js"></script>
<style>
:root{--bg:#0a0e17;--card:#111927;--border:rgba(255,255,255,0.06);--text:#c8d6e5;--dim:#5a6a7a;--cyan:#00d4ff;--green:#00e676;--red:#ff5252;--orange:#ff9100;--yellow:#ffd740;--purple:#b388ff;--teal:#00bfa5}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hdr{background:linear-gradient(135deg,#0d1b2a,#1b2838);border-bottom:1px solid rgba(0,212,255,.15);padding:36px 0;text-align:center}
.hdr h1{font-size:2.2rem;font-weight:700;background:linear-gradient(90deg,var(--cyan),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--dim);font-size:.9rem;margin-top:6px}
.ctr{max-width:1400px;margin:0 auto;padding:28px 20px}

/* metric cards */
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:28px}
.mc{background:linear-gradient(135deg,#111927,#162033);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;cursor:default}
.mc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.mc.mte::before{background:linear-gradient(90deg,var(--red),var(--orange))}
.mc.vec::before{background:linear-gradient(90deg,var(--green),var(--cyan))}
.mc.scl::before{background:linear-gradient(90deg,var(--yellow),var(--orange))}
.mc.cub::before{background:linear-gradient(90deg,var(--purple),#7c4dff)}
.mc .lb{font-size:.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.mc .vl{font-size:1.9rem;font-weight:700;margin:3px 0}
.mc .un{font-size:.8rem;color:var(--dim)}
.mc.mte .vl{color:var(--red)}.mc.vec .vl{color:var(--green)}.mc.scl .vl{color:var(--yellow)}.mc.cub .vl{color:var(--purple)}
.mc.warn{border-color:rgba(255,215,64,.25)}
.mc .warn-tag{display:inline-block;background:rgba(255,215,64,.12);color:var(--yellow);font-size:.7rem;padding:2px 8px;border-radius:10px;margin-top:4px}

/* sections */
.sec{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:24px;overflow:hidden}
.sh{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sh .ic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem}
.sh .ic.mte{background:rgba(255,82,82,.15)}.sh .ic.vec{background:rgba(0,230,118,.15)}.sh .ic.scl{background:rgba(255,215,64,.15)}.sh .ic.cub{background:rgba(179,136,255,.15)}
.sh h2{font-size:1.15rem;font-weight:600}
.sh .bd{margin-left:auto;padding:3px 10px;border-radius:16px;font-size:.72rem;font-weight:600}
.bd-ok{background:rgba(0,230,118,.15);color:var(--green)}.bd-warn{background:rgba(255,215,64,.15);color:var(--yellow)}.bd-skip{background:rgba(179,136,255,.15);color:var(--purple)}
.sb{padding:22px}

/* chart grid — 固定高度，防止 Chart.js 把页面撑到数千像素 */
.cg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.cg-4{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.cg,.cg-4{grid-template-columns:1fr}}
.cb{background:rgba(0,0,0,.2);border-radius:8px;padding:12px 14px}
.cb h3{font-size:.82rem;color:var(--dim);margin-bottom:8px;font-weight:500}
.chart-wrap{position:relative;height:168px;width:100%}
.chart-wrap.sm{height:120px}
.chart-wrap canvas{display:block;max-height:100%!important}

/* 拟合验证：紧凑卡片网格 */
.bench-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.bench-card{background:rgba(0,0,0,.22);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.bench-card h4{font-size:.78rem;color:var(--text);margin-bottom:2px;font-weight:600}
.bench-card .meta{font-size:.72rem;color:var(--dim);margin-bottom:6px;line-height:1.4}
.bench-card.warn{border-color:rgba(255,215,64,.2)}

/* 可折叠区块 */
details.coll{margin-bottom:14px}
details.coll summary{cursor:pointer;list-style:none;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-weight:600;font-size:.92rem}
details.coll summary::-webkit-details-marker{display:none}
details.coll summary::before{content:'▸ ';color:var(--cyan)}
details.coll[open] summary::before{content:'▾ '}
details.coll .coll-body{padding:14px 0 4px}

/* tables */
.dt{width:100%;border-collapse:collapse;margin-top:14px;font-size:.88rem}
.dt th{text-align:left;padding:9px 12px;color:var(--dim);font-weight:500;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.dt td{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.dt tr:hover{background:rgba(255,255,255,.02)}
.dt .mo{font-family:'SF Mono','Fira Code',monospace;font-size:.82rem}
.r2g{color:var(--green)}.r2w{color:var(--yellow)}.r2b{color:var(--red)}

/* analysis */
.ab{background:rgba(0,212,255,.04);border:1px solid rgba(0,212,255,.1);border-radius:8px;padding:18px;margin-top:18px}
.ab h3{color:var(--cyan);font-size:.95rem;margin-bottom:10px}
.ab p{color:#8899aa;line-height:1.7;font-size:.88rem}
.ab code{background:rgba(0,212,255,.1);padding:1px 5px;border-radius:3px;font-size:.82rem;color:var(--cyan)}
.ab.warn-box{border-color:rgba(255,215,64,.2);background:rgba(255,215,64,.03)}
.ab.warn-box h3{color:var(--yellow)}
.ab.skip-box{border-color:rgba(179,136,255,.2);background:rgba(179,136,255,.03)}
.ab.skip-box h3{color:var(--purple)}

.ft{text-align:center;padding:36px 0;color:#2a3a4a;font-size:.82rem;border-top:1px solid rgba(255,255,255,.04);margin-top:36px}
</style>
</head>
<body>

<div class="hdr">
  <h1>🔬 Ascend 310P3 微架构参数测定</h1>
  <p class="sub">DaVinci AI Core μBench · CANN 8.2.RC1 · 2026-06-07</p>
</div>

<div class="ctr" id="app"></div>

<div class="ft">
  <p>Ascend C μBench · DaVinci AI Core 微架构参数测定 · Ascend 310P3 × 4 NPU</p>
  <p style="margin-top:3px">CANN 8.2.RC1 · g++ 10.3.1 · bisheng (Ascend C compiler)</p>
</div>

      "lab_mapping": "V3≈ 向量 Add 吞吐（带 DataCopy/PipeBarrier，未满占）",
      "unreliable": false,
      "unreliable_reason": "",
      "slope_us": 0.114229,
      "intercept_us": -3.18562,
      "r2": 0.999999,
      "raw_slope_us": 0.125253,
      "raw_r2": 0.99993,
      "derived": {
        "gflops": 35.9,
        "ops_per_cycle": 0.14,
        "total_ops_per_repeat": 4096,
        "primary_value": "35.9",
        "primary_unit": "GFLOPS",
        "primary_label": "FP32 吞吐"
      },
      "sweep": [
        {
          "repeat": 500,
          "total_us": 78.6625,
          "baseline_us": 24.4491,
          "adjusted_us": 54.2134
        },
        {
          "repeat": 1000,
          "total_us": 136.636,
          "baseline_us": 25.7742,
          "adjusted_us": 110.862
        },
        {
          "repeat": 2500,
          "total_us": 325.225,
          "baseline_us": 43.0613,
          "adjusted_us": 282.164
        },
        {
          "repeat": 5000,
          "total_us": 640.543,
          "baseline_us": 72.4664,
          "adjusted_us": 568.077
        }
      ]
    },
    {
      "name": "cube_tile_latency",
      "status": "skipped",
      "label": "cube tile latency",
      "tooltip": "310P Matmul 模板挂起，已跳过",
      "lab_mapping": "Cube N/A — 待 910B 验证"
    },
    {
      "name": "cube_throughput",
      "status": "skipped",
      "label": "cube throughput",
      "tooltip": "310P Matmul 模板挂起，已跳过",
      "lab_mapping": "Cube N/A — 待 910B 验证"
    },
    {
      "name": "cube_scaling",
      "status": "skipped",
      "label": "cube scaling",
      "tooltip": "310P Matmul 模板挂起，已跳过",
      "lab_mapping": "Cube N/A — 待 910B 验证"
    }
  ]
}
</script>

<script>
"use strict";

/* ── 读取 EMBEDDED_DATA ──────────────────────────────────────────────── */
const DATA = JSON.parse(document.getElementById('EMBEDDED_DATA').textContent);
const META = DATA.meta;
const KC   = META.kernel_constants;
const BENCH = DATA.benchmarks;

const byName = Object.fromEntries(BENCH.map(b => [b.name, b]));
const ok     = BENCH.filter(b => b.status === 'ok');

/* ── deriveMetric: 从 EMBEDDED_DATA.derived 读取，不再重新算 ────────── */
function dv(b, key, fallback) {
  return (b.derived && b.derived[key] !== undefined) ? b.derived[key] : fallback;
}
function primary(b) {
  if (b.status !== 'ok') return { v: '—', u: '', lb: '' };
  return { v: dv(b, primary_v_key(b), '—'), u: dv(b, 'primary_unit', 'μs/op'), lb: dv(b, 'primary_label', '') };
}
function primary_v_key(b) {
  if (b.derived && b.derived.bandwidth_gbs !== undefined) return 'primary_value';
  if (b.derived && b.derived.gflops !== undefined) return 'primary_value';
  if (b.derived && b.derived.latency_ns !== undefined) return 'primary_value';
  return 'primary_value';
}

/* ── 辅助 ──────────────────────────────────────────────────────────────── */
function r2cls(v) { return v >= 0.99 ? 'r2g' : v >= 0.95 ? 'r2w' : 'r2b'; }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ── 渲染概览卡片 ─────────────────────────────────────────────────────── */
function renderMetrics() {
  let h = '<div class="mg">';

  // MTE copy BW
  const mc = byName['mte_copy_bw'];
  h += `<div class="mc mte" title="${esc(KC.mte_copy_bw.tooltip)}">
    <div class="lb">MTE 拷贝带宽</div>
    <div class="vl">${dv(mc,'primary_value','—')}</div>
    <div class="un">${dv(mc,'primary_unit','GB/s')} · ${esc(KC.mte_copy_bw.lab_mapping)}</div>
  </div>`;

  // MTE startup
  const ms = byName['mte_startup_latency'];
  h += `<div class="mc mte" title="${esc(KC.mte_startup_latency.tooltip)}">
    <div class="lb">${esc(KC.mte_startup_latency.label)}</div>
    <div class="vl">${dv(ms,'primary_value','—')}</div>
    <div class="un">${dv(ms,'primary_unit','ns')} · ${esc(KC.mte_startup_latency.lab_mapping)}</div>
  </div>`;

  // V1 Add latency
  const v1 = byName['vector_add_latency'];
  h += `<div class="mc vec" title="${esc(KC.vector_add_latency.tooltip)}">
    <div class="lb">${esc(KC.vector_add_latency.label)}</div>
    <div class="vl">${dv(v1,'primary_value','—')}</div>
    <div class="un">${dv(v1,'primary_unit','ns')} · ${esc(KC.vector_add_latency.lab_mapping)}</div>
  </div>`;

  // V3 throughput
  const v3 = byName['vector_throughput'];
  h += `<div class="mc vec" title="${esc(KC.vector_throughput.tooltip)}">
    <div class="lb">${esc(KC.vector_throughput.label)}</div>
    <div class="vl">${dv(v3,'primary_value','—')}</div>
    <div class="un">${dv(v3,'primary_unit','GFLOPS')} · ${dv(v3,'ops_per_cycle','—')} ops/cycle @1GHz</div>
  </div>`;

  // scalar arith — 带警告
  const s1 = byName['scalar_arith_latency'];
  h += `<div class="mc scl warn" title="${esc(KC.scalar_arith_latency.unreliable_reason)}">
    <div class="lb">${esc(KC.scalar_arith_latency.label)}</div>
    <div class="vl">${dv(s1,'primary_value','—')}</div>
    <div class="un">${dv(s1,'primary_unit','ns')} · R²=${s1.r2}</div>
    <div class="warn-tag">⚠ 低可信度: ${esc(KC.scalar_arith_latency.unreliable_reason)}</div>
  </div>`;

  // Cube
  h += `<div class="mc cub" title="310P Matmul 模板挂起，已跳过">
    <div class="lb">Cube 矩阵乘法</div>
    <div class="vl" style="font-size:1.3rem">310P 不支持</div>
    <div class="un">已跳过 · 待 910B 验证</div>
  </div>`;

  h += '</div>';
  return h;
}

/* ── 可折叠：测试配置 ──────────────────────────────────────────────────── */
function renderConfig() {
  const rp = META.run_params;
  return `<details class="coll"><summary>⚙️ 测试配置 & 推导公式</summary><div class="coll-body"><div class="cg">
    <div class="cb" style="background:transparent"><h3>运行参数</h3><table class="dt" style="margin-top:0">
      <tr><td>device</td><td class="mo">${rp.device}</td></tr>
      <tr><td>warmup / iters</td><td class="mo">${rp.warmup} / ${rp.iters}</td></tr>
      <tr><td>blocks</td><td class="mo">${rp.blocks}</td></tr>
      <tr><td>repeats sweep</td><td class="mo">${rp.repeats_sweep.join(', ')}</td></tr>
      <tr><td>size_bytes</td><td class="mo">${rp.size_bytes} (${rp.size_bytes/1024} KB)</td></tr>
    </table></div>
    <div class="cb" style="background:transparent"><h3>推导公式</h3><table class="dt" style="margin-top:0">
      <tr><td>MTE 带宽</td><td class="mo">${KC.mte_copy_bw.blocks}×1024×2 / slope_us → GB/s</td></tr>
      <tr><td>Vector GFLOPS</td><td class="mo">${KC.vector_throughput.blocks}×${KC.vector_throughput.lanes}×${KC.vector_throughput.elems} / slope_us</td></tr>
      <tr><td>拟合图 Y 轴</td><td class="mo">adjusted_us / repeat（μs/op），应接近水平线 = slope</td></tr>
    </table></div>
  </div></div></details>`;
}

/* ── 汇总表（一行一 benchmark）──────────────────────────────────────── */
function renderMasterTable() {
  let h = `<div class="sec"><div class="sh"><div class="ic" style="background:rgba(0,212,255,.12)">📋</div><h2>测定结果汇总</h2><span class="bd bd-ok">${ok.length} 项通过</span></div><div class="sb">`;
  h += '<table class="dt"><thead><tr><th>类别</th><th>基准</th><th>派生指标</th><th>斜率 (μs/op)</th><th>R²</th><th>Lab 映射</th></tr></thead><tbody>';
  for (const b of ok) {
    const cat = b.name.startsWith('mte_') ? 'MTE' : b.name.startsWith('vector_') ? 'Vector' : 'Scalar';
    const kc = KC[b.name] || {};
    const derived = `${b.derived.primary_value} ${b.derived.primary_unit}`;
    h += `<tr${b.unreliable ? ' style="opacity:.85"' : ''}>
      <td>${cat}</td>
      <td>${esc(b.label)}${b.unreliable ? ' ⚠' : ''}</td>
      <td class="mo">${derived}</td>
      <td class="mo">${b.slope_us}</td>
      <td class="${r2cls(b.r2)}">${b.r2.toFixed(5)}</td>
      <td style="font-size:.8rem;color:var(--dim)">${esc(kc.lab_mapping || '—')}</td>
    </tr>`;
  }
  h += '</tbody></table></div></div>';
  return h;
}

/* ── 拟合验证：μs/op 应平坦（比绝对 time 更易读）──────────────────────── */
function benchSummaryLine(b) {
  const d = b.derived;
  if (b.name === 'mte_copy_bw') return `斜率 ${b.slope_us} μs/op → ${d.primary_value} ${d.primary_unit}`;
  if (b.name === 'vector_throughput') return `${d.primary_value} ${d.primary_unit} · ${d.ops_per_cycle} vec-inst/cycle`;
  if (d.latency_ns !== undefined) return `≈ ${d.primary_value} ${d.primary_unit}/op`;
  return `斜率 ${b.slope_us} μs/op`;
}

function renderFitGrid() {
  let h = `<div class="sec"><div class="sh"><div class="ic" style="background:rgba(0,230,118,.12)">📐</div>
    <h2>线性拟合验证</h2><span class="bd bd-ok">Y = adjusted/repeat (μs/op)</span></div><div class="sb">
    <p style="font-size:.82rem;color:var(--dim);margin-bottom:12px">
      纵轴为每次 repeat 的<strong>单位成本</strong>（baseline 校正后），拟合良好时应接近水平虚线（= 调整后斜率）。
      不再绘制绝对 time(μs)，避免 0~1400 μs 量级把图表撑得过长。
    </p><div class="bench-grid">`;
  for (const b of ok) {
    const kc = KC[b.name] || {};
    h += `<div class="bench-card${b.unreliable ? ' warn' : ''}">
      <h4>${esc(b.label)}</h4>
      <div class="meta">${esc(benchSummaryLine(b))} · R²=${b.r2.toFixed(4)}</div>
      <div class="chart-wrap sm"><canvas id="chart_${b.name}"></canvas></div>
    </div>`;
  }
  h += '</div></div></div>';
  return h;
}

/* ── 原始 sweep 数据（可折叠）────────────────────────────────────────── */
function renderRawTable() {
  let h = '<table class="dt"><thead><tr><th>基准</th><th>repeat</th><th>total</th><th>baseline</th><th>adjusted</th><th>μs/op</th></tr></thead><tbody>';
  for (const b of ok) {
    for (let i = 0; i < b.sweep.length; i++) {
      const s = b.sweep[i];
      const perOp = s.adjusted_us / s.repeat;
      h += '<tr>';
      if (i === 0) h += `<td rowspan="${b.sweep.length}">${esc(b.name)}</td>`;
      h += `<td class="mo">${s.repeat}</td><td class="mo">${s.total_us.toFixed(1)}</td><td class="mo">${s.baseline_us.toFixed(1)}</td>
        <td class="mo">${s.adjusted_us.toFixed(2)}</td><td class="mo">${perOp.toFixed(4)}</td></tr>`;
    }
  }
  h += '</tbody></table>';
  return `<details class="coll"><summary>📊 原始 sweep 数据 (μs)</summary><div class="coll-body">${h}</div></details>`;
}

function renderCube() {
  return `<details class="coll"><summary>🧮 Cube — 310P 不支持 · 已跳过</summary><div class="coll-body">
    <div class="ab skip-box"><p>
      三个 Cube 基准在 310P3 上 <code>Matmul</code> 模板挂起，已跳过。待 910B 验证。未修改 Cube 内核源码。
    </p></div></details>`;
}

/* ── 综合对比（横向条形图，按量级分组）────────────────────────────────── */
function renderOverview() {
  return `<div class="sec"><div class="sh"><div class="ic" style="background:rgba(0,212,255,.15)">📈</div><h2>派生指标对比</h2></div><div class="sb">
    <div class="cg cg-4">
      <div class="cb"><h3>带宽 GB/s</h3><div class="chart-wrap"><canvas id="overview_bw"></canvas></div></div>
      <div class="cb"><h3>吞吐 GFLOPS</h3><div class="chart-wrap"><canvas id="overview_gflops"></canvas></div></div>
      <div class="cb"><h3>延迟 ns/op（对数）</h3><div class="chart-wrap"><canvas id="overview_lat"></canvas></div></div>
      <div class="cb"><h3>拟合 R²</h3><div class="chart-wrap"><canvas id="overview_r2"></canvas></div></div>
    </div>
    <div class="ab" style="margin-top:14px"><h3>⚠ 310P 免责声明</h3><p>${esc(META.disclaimer)}</p></div>
  </div></div>`;
}

/* ── Chart.js 绘图（固定容器高度 + 合理 Y 轴）────────────────────────── */
const AX = {
  x: { ticks: { color: '#5a6a7a', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } },
  y: { ticks: { color: '#5a6a7a', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,.04)' } }
};

const COLORS = {
  mte_copy_bw: '#ff5252', mte_startup_latency: '#ff9100', mte_granularity: '#ff6d00',
  vector_add_latency: '#00e676', vector_mul_latency: '#00d4ff', vector_throughput: '#00bfa5',
  vector_pipeline_depth: '#64ffda', scalar_arith_latency: '#ffd740', scalar_branch_overhead: '#ff9100'
};

/** 拟合验证：μs/op = adjusted/repeat，水平线 = slope */
function drawPerOpFit(cid, b, color) {
  const el = document.getElementById(cid);
  if (!el || typeof Chart === 'undefined') return;
  const sw = b.sweep;
  const reps = sw.map(s => s.repeat);
  const perOp = sw.map(s => s.adjusted_us / s.repeat);
  const slope = b.slope_us;
  const flat = reps.map(() => slope);
  const vals = perOp.filter(v => isFinite(v));
  const pad = (Math.max(...vals, slope) - Math.min(...vals, slope)) * 0.15 || slope * 0.1 || 0.01;
  const yMin = Math.min(...vals, slope) - pad;
  const yMax = Math.max(...vals, slope) + pad;

  new Chart(el.getContext('2d'), {
    type: 'line',
    data: {
      labels: reps,
      datasets: [
        { label: 'μs/op', data: perOp, borderColor: color, backgroundColor: color + '44',
          pointRadius: 4, borderWidth: 2, tension: 0 },
        { label: `slope ${slope}`, data: flat, borderColor: '#8899aa',
          borderDash: [4, 3], pointRadius: 0, borderWidth: 1.5, tension: 0 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ...AX.x, title: { display: true, text: 'repeat', color: '#5a6a7a', font: { size: 10 } } },
        y: { ...AX.y, min: yMin, max: yMax, title: { display: true, text: 'μs/op', color: '#5a6a7a', font: { size: 10 } } }
      }
    }
  });
}

/** 横向条形图（标签长时更易读） */
function drawHBar(cid, labels, vals, colors, unit, logScale) {
  const el = document.getElementById(cid);
  if (!el || typeof Chart === 'undefined' || !labels.length) return;
  new Chart(el.getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [{ data: vals, backgroundColor: colors.map(c => c + '99'), borderColor: colors, borderWidth: 1.5 }]
    },
    options: {
      indexAxis: 'y', responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (c) => `${c.parsed.x} ${unit}` } }
      },
      scales: {
        x: { ...AX.x, type: logScale ? 'logarithmic' : 'linear', title: { display: true, text: unit, color: '#5a6a7a', font: { size: 10 } } },
        y: { ...AX.y, ticks: { ...AX.y.ticks, autoSkip: false, font: { size: 9 } } }
      }
    }
  });
}

function drawCharts() {
  if (typeof Chart === 'undefined') return;
  const reliable = ok.filter(b => !b.unreliable);

  for (const b of ok) {
    drawPerOpFit(`chart_${b.name}`, b, COLORS[b.name] || '#888');
  }

  const bwItems = reliable.filter(b => b.derived.bandwidth_gbs);
  drawHBar('overview_bw', bwItems.map(b => b.label), bwItems.map(b => b.derived.bandwidth_gbs),
    bwItems.map(b => COLORS[b.name]), 'GB/s', false);

  const tpItems = reliable.filter(b => b.derived.gflops);
  drawHBar('overview_gflops', tpItems.map(b => b.label), tpItems.map(b => b.derived.gflops),
    tpItems.map(b => COLORS[b.name]), 'GFLOPS', false);

  const latItems = reliable.filter(b => b.derived.latency_ns);
  drawHBar('overview_lat', latItems.map(b => b.label), latItems.map(b => b.derived.latency_ns),
    latItems.map(b => COLORS[b.name]), 'ns', true);

  const r2s = ok.map(b => b.r2);
  const el2 = document.getElementById('overview_r2');
  if (el2) {
    new Chart(el2.getContext('2d'), {
      type: 'bar',
      data: {
        labels: ok.map(b => b.label),
        datasets: [{
          data: r2s,
          backgroundColor: r2s.map(v => v >= 0.99 ? '#00e67688' : v >= 0.95 ? '#ffd74088' : '#ff525288'),
          borderColor: r2s.map(v => v >= 0.99 ? '#00e676' : v >= 0.95 ? '#ffd740' : '#ff5252'),
          borderWidth: 1.5
        }]
      },
      options: {
        indexAxis: 'y', responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { min: 0.9, max: 1.0001, ...AX.x, title: { display: true, text: 'R²', color: '#5a6a7a', font: { size: 10 } } },
          y: { ...AX.y, ticks: { font: { size: 9 }, color: '#5a6a7a' } }
        }
      }
    });
  }
}

/* ── 主渲染 ────────────────────────────────────────────────────────────── */
function render() {
  let html = '';
  html += renderMetrics();
  html += renderOverview();
  html += renderMasterTable();
  html += renderFitGrid();
  html += renderRawTable();
  html += renderConfig();
  html += renderCube();

  document.getElementById('app').innerHTML = html;
  if (typeof Chart === 'undefined') {
    const warn = document.createElement('div');
    warn.className = 'ab warn-box';
    warn.style.marginBottom = '20px';
    warn.innerHTML = '<h3>⚠ 图表库未加载</h3><p>请确保 <code>chart.umd.min.js</code> 与本页面位于同一目录，或通过本地 HTTP 服务打开。</p>';
    document.getElementById('app').prepend(warn);
    return;
  }
  try { drawCharts(); } catch (e) { console.error('drawCharts failed:', e); }
}

render();
</script>
</body>
</html>
